version: "3.9"

services:
  api:
    build: .
    container_name: football_api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=db
    restart: always

  worker:
    build: .
    container_name: prediction_worker
    command: python -m workers.prediction_worker
    depends_on:
      - redis
      - api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

  producer:
    build: .
    container_name: multi_league_runner
    command: python -m workers.multi_league_runner
    depends_on:
      - api
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: on-failure

  db:
    image: postgres:15
    container_name: football_db
    restart: always
    environment:
      POSTGRES_DB: football_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: strongpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: football_redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
